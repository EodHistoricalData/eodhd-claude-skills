name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          python3 -c "import json; json.load(open('.mcp.json'))"

      - name: Validate plugin.json schema
        run: |
          python3 - <<'PY'
          import json
          m = json.load(open('.claude-plugin/plugin.json'))
          assert isinstance(m.get('name'), str), 'name must be string'
          assert isinstance(m.get('version'), str), 'version must be string'
          assert isinstance(m.get('repository'), str), 'repository must be string URL (Claude Code schema)'
          assert m['repository'].startswith('https://'), 'repository must be https URL'
          mcp = m.get('mcp', {}).get('eodhd', {})
          assert mcp.get('type') == 'http', 'mcp.eodhd.type must be http'
          assert mcp.get('url', '').startswith('https://'), 'mcp.eodhd.url must be https URL'
          print('plugin.json OK')
          PY

      - name: Version sync (plugin.json == marketplace.json)
        run: |
          python3 - <<'PY'
          import json
          p = json.load(open('.claude-plugin/plugin.json'))['version']
          m = json.load(open('.claude-plugin/marketplace.json'))['metadata']['version']
          assert p == m, f'version drift: plugin.json={p} marketplace.json={m}'
          print(f'version sync OK: {p}')
          PY

      - name: Static skill/agent/command references
        run: python3 tests/test_skill_references.py
        env:
          # If repo has an EODHD_API_TOKEN secret, the manifest tool-count check
          # also cross-validates against live MCP server. Missing secret = check skipped.
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}

      - name: Registry parity checks
        run: python3 tests/test_registry.py

  mcp-endpoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract MCP URL from .mcp.json
        id: url
        run: |
          URL=$(python3 -c "import json; print(json.load(open('.mcp.json'))['eodhd']['url'])")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "MCP URL: $URL"

      - name: Probe MCP endpoint (expect 401/405, not 404)
        run: |
          URL="${{ steps.url.outputs.url }}"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 "$URL" || echo "000")
          echo "HTTP $CODE from $URL"
          case "$CODE" in
            401|405|400) echo "OK: server is up, just needs proper auth/method"; exit 0 ;;
            404)         echo "FAIL: 404 — likely wrong domain (Cloudflare fallback)"; exit 1 ;;
            000)         echo "FAIL: connection error"; exit 1 ;;
            *)           echo "WARN: unexpected $CODE — review manually"; exit 0 ;;
          esac

  e2e-python-client:
    # Run only when EODHD_API_TOKEN secret is configured in repo settings.
    # On forks / un-secret PRs, this job is skipped (no false negatives).
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Check token availability
        id: token
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: |
          if [ -n "$EODHD_API_TOKEN" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::warning::EODHD_API_TOKEN secret not set — e2e tests skipped"
          fi

      - name: Run Python client e2e against live API
        if: steps.token.outputs.have == 'true'
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: python3 tests/test_python_client.py

      - name: Run MCP v1 + v2 e2e
        if: steps.token.outputs.have == 'true'
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: python3 tests/test_mcp_v1.py
